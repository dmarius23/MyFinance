spring:
  application:
    name: myfinance-backend

  # Multipart limits sized to the app's 20 MB per-file cap (DocumentService.MAX_SIZE_BYTES), with
  # headroom for multipart framing. Without this the servlet default (~1 MB) rejects valid uploads
  # before the application validation runs.
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

  # Graceful shutdown: on SIGTERM (deploy), let the outbox relay's in-flight tick finish rather than being
  # cut off mid-delivery. Any message still PROCESSING when the timeout lapses is reclaimed by the reaper
  # on the next worker start, so nothing is lost either way.
  task:
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: 30s
  lifecycle:
    timeout-per-shutdown-phase: 35s

  # Application datasource — connects as the RLS-subject role. Wrapped by RlsDataSource.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/myfinance}
    username: ${DB_APP_USER:myfinance_app}
    password: ${DB_APP_PASSWORD:myfinance_app}
    hikari:
      maximum-pool-size: 10
      pool-name: myfinance-app-pool

  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Flyway runs DDL as the admin role (not subject to RLS).
  flyway:
    enabled: true
    url: ${DB_ADMIN_URL:${DB_URL:jdbc:postgresql://localhost:5432/myfinance}}
    user: ${DB_ADMIN_USER:postgres}
    password: ${DB_ADMIN_PASSWORD:postgres}
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # SMTP transport for myfinance.email.provider=smtp (an EU provider — Brevo, Scaleway TEM, Mailjet, …).
  # Blank SMTP_HOST → no JavaMailSender is created, so this costs nothing for logging/ses providers.
  # Timeouts stop a stuck SMTP server from hanging a worker delivery thread (the outbox retries instead).
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:true}
      mail.smtp.connectiontimeout: 10000
      mail.smtp.timeout: 15000
      mail.smtp.writetimeout: 15000

  # Resource server — validates Supabase-issued JWTs via the project JWKS endpoint.
  # Set SUPABASE_JWKS_URI to your project's URL; until then, secured endpoints return 401.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_JWKS_URI:https://YOUR-PROJECT.supabase.co/auth/v1/.well-known/jwks.json}
          # Supabase signs access tokens with ES256 (ECC). Without this, the decoder defaults to
          # RS256 only and rejects valid tokens ("Another algorithm expected").
          jws-algorithms:
            - ES256
            - RS256

# Web app: drain in-flight HTTP requests on shutdown (the worker has no web server; its relay is drained
# via spring.task.scheduling.shutdown above).
server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    # Don't let the readiness/liveness probe open an SMTP connection on every check (provider=smtp).
    mail:
      enabled: false

myfinance:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  supabase:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    # Expected token issuer (the project's .../auth/v1 URL), pinned by the JWT decoder so a
    # validly-signed token from a *different* Supabase project is rejected. Leave blank to derive it
    # from jwk-set-uri (issuer = JWKS URL minus /.well-known/jwks.json) — so setting only
    # SUPABASE_JWKS_URI is enough, and it still fails closed on the YOUR-PROJECT placeholder.
    issuer: ${SUPABASE_ISSUER:}
  # Receipt-image OCR. Blank api-key → image receipts stay NEEDS_REVIEW (no LLM calls, no cost).
  # Prod uses Claude via AWS Bedrock (EU); local/dev can use the Anthropic API directly.
  receipt:
    # provider=bedrock → AWS Bedrock Claude in an EU region (EU-resident OCR, the production path);
    # provider=anthropic → Anthropic Messages API (US-hosted). See docs/MyFinance-data-privacy-residency-v1.md.
    provider: ${RECEIPT_PROVIDER:anthropic}
    api-key: ${RECEIPT_API_KEY:${ANTHROPIC_API_KEY:}}
    # anthropic: a model id (claude-sonnet-4-5-20250929). bedrock: the model / EU inference-profile id
    # (e.g. eu.anthropic.claude-sonnet-4-5-20250929-v1:0).
    model: ${RECEIPT_MODEL:claude-sonnet-4-5-20250929}
    # anthropic only: override the API base URL (blank → api.anthropic.com).
    base-url: ${RECEIPT_BASE_URL:}
    # bedrock only: AWS region, e.g. eu-central-1 (blank → AWS default region provider chain).
    region: ${RECEIPT_REGION:}
  # Email delivery (data must stay in the EU — see docs/MyFinance-data-privacy-residency-v1.md):
  #   provider=smtp → any EU SMTP provider (Brevo, Scaleway TEM, Mailjet, …) via spring.mail.* below
  #                   — no AWS account, works from the EU-hosted app;
  #   provider=ses  → Amazon SES (use an EU region); callable off-AWS with IAM access keys;
  #   anything else → dev logging no-op (no real send).
  # Every module sends through the shared EmailSender port; only the adapter changes here.
  email:
    provider: ${EMAIL_PROVIDER:logging}
    # ses only: AWS region, e.g. eu-central-1 / eu-west-1 (blank → AWS default region provider chain).
    region: ${EMAIL_REGION:}
    # ses only: optional SES configuration set for bounce/complaint tracking (blank → none).
    configuration-set: ${EMAIL_CONFIGURATION_SET:}
  # Transactional outbox: email sends are recorded QUEUED + written to outbox_message in the business
  # transaction, then delivered by the worker's OutboxRelayScheduler (with retries + DLQ). In a single
  # web process (dev) set OUTBOX_INLINE=true to drain inline right after commit — no separate worker.
  outbox:
    inline: ${OUTBOX_INLINE:false}
    relay-delay-ms: ${OUTBOX_RELAY_DELAY_MS:5000}
    # Multi-worker single-flight: a claimed (PROCESSING) message is invisible to other workers until it is
    # delivered or this visibility timeout lapses — after which a reaper returns a crashed worker's row to
    # PENDING for redelivery. Keep comfortably above the slowest expected delivery (SES + attachments).
    visibility-timeout-seconds: ${OUTBOX_VISIBILITY_TIMEOUT_SECONDS:300}
  # Web Push (VAPID) for the PWA. Keys are secrets via env only (generate with
  # `npx web-push generate-vapid-keys`). Blank keys → push disabled (no-op sender),
  # in-app notifications still work. The public key is served to the PWA to subscribe.
  push:
    vapid:
      public-key: ${VAPID_PUBLIC_KEY:}
      private-key: ${VAPID_PRIVATE_KEY:}
      subject: ${VAPID_SUBJECT:mailto:noreply@myfinance.local}
