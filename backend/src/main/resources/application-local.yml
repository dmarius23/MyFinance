# Local dev profile: load demo seed data and verbose app logging.
# Activate with SPRING_PROFILES_ACTIVE=local (set by docker-compose).
spring:
  flyway:
    locations: classpath:db/migration,classpath:db/seed
    validate-on-migrate: false

# Redis isn't required for local dev (jobs are enqueued lazily); don't let its health check mark
# the app DOWN. In prod the worker + Redis run, so the check stays enabled there.
management:
  health:
    redis:
      enabled: false

logging:
  level:
    ro.myfinance: DEBUG
